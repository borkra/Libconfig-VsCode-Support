name: Publish Extension Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run compile && npm run bundle

      - name: Package VSIX
        id: package_vsix
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: stub
          dryRun: true

      - name: Publish GitHub release with VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package_vsix.outputs.vsixPath }}
          generate_release_notes: true
