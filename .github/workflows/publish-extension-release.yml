name: Publish Extension Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run compile && npm run bundle

      - name: Package VSIX
        run: npx @vscode/vsce package --no-yarn --out libconfig-lang.vsix

      - name: Publish GitHub release with VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: libconfig-lang.vsix
          generate_release_notes: true
