name: Publish VS Code Marketplace Extension

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to publish (for example, v1.2.3)
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-marketplace:
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag exists
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${{ inputs.release_tag }}" --repo "${{ github.repository }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run compile && npm run bundle

      - name: Publish to VS Code Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VSCE_PAT }}
