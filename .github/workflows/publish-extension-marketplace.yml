name: Publish Extension Registries

run-name: "Publish ${{ inputs.publish_target }} — ${{ inputs.release_tag }}"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to publish (for example, v1.2.3)
        required: true
        type: string
      publish_target:
        description: Where to publish the VSIX
        required: true
        type: choice
        default: both
        options:
          - both
          - vscode
          - ovsx

permissions:
  contents: read

jobs:
  publish-marketplace:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          raw="${{ inputs.release_tag }}"
          tag="${raw#v}"
          echo "release_tag=v$tag" >> "$GITHUB_OUTPUT"

      - name: Download VSIX from release
        run: gh release download "${{ steps.tag.outputs.release_tag }}" --repo "${{ github.repository }}" --pattern "*.vsix"

      - name: Validate VS Code Marketplace token
        if: ${{ inputs.publish_target == 'both' || inputs.publish_target == 'vscode' }}
        run: |
          if [ -z "${{ secrets['VSCE_PAT'] }}" ]; then
            echo "Missing marketplace token. Set repository secret VSCE_PAT."
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        if: ${{ inputs.publish_target == 'both' || inputs.publish_target == 'vscode' }}
        run: npx @vscode/vsce publish --no-yarn --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets['VSCE_PAT'] }}

      - name: Publish to Open VSX Registry
        if: ${{ inputs.publish_target == 'both' || inputs.publish_target == 'ovsx' }}
        run: npx ovsx publish --packagePath *.vsix
        env:
          OVSX_PAT: ${{ secrets['OVSX_PAT'] }}
