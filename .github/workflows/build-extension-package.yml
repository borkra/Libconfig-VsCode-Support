name: Build Extension Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run compile && npm run bundle

      - name: Package VSIX
        run: npx @vscode/vsce package --no-yarn --out libconfig-lang.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: libconfig-lang-vsix
          path: libconfig-lang.vsix
          if-no-files-found: error
